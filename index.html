<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#f4f6f8,#e9eef5);
margin:0;
}

/* LOGO */
.logo{
position:absolute;
top:15px;
left:20px;
width:140px;
}

/* CONTENEDOR */
.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* CAJA */
.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:90%;
max-width:450px;
}

h1{
margin-top:0;
color:#333;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

/* COLOR */
.colorpick{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.colorpick label{
font-size:14px;
}

/* BOTONES */
button{
padding:12px;
margin:5px;
border:none;
border-radius:6px;
background:#2b7cff;
color:white;
cursor:pointer;
font-size:15px;
width:100%;
}

button:hover{
background:#1a5edb;
}

/* QR */
#qrcode{
margin-top:20px;
padding:10px;
background:white;
border-radius:10px;
}

footer{
margin-top:30px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container">

<div class="card">

<h1>Free QR Generator</h1>

<input id="texto" placeholder="Pon un link o texto">

<div class="colorpick">
<label>Color QR</label>
<input type="color" id="colorQR" value="#000000">

<label>Fondo</label>
<input type="color" id="colorBG" value="#ffffff">
</div>

<button onclick="generarQR()">Generar QR</button>

<div id="qrcode"></div>

<button onclick="descargarQR('png')">Descargar PNG</button>
<button onclick="descargarQR('jpg')">Descargar JPG</button>

<footer>
Free QR Generator • Gratis y rápido
</footer>

</div>

</div>

<script>

let qr;

function generarQR(){

document.getElementById("qrcode").innerHTML="";

let texto=document.getElementById("texto").value;
let color=document.getElementById("colorQR").value;
let bg=document.getElementById("colorBG").value;

qr=new QRCode(document.getElementById("qrcode"),{
text:texto,
width:220,
height:220,
colorDark:color,
colorLight:bg,
correctLevel:QRCode.CorrectLevel.H
});

}

function descargarQR(formato){

let canvas=document.querySelector("#qrcode canvas");

if(canvas){

let link=document.createElement("a");
link.download="qr."+formato;
link.href=canvas.toDataURL("image/"+formato);
link.click();

}else{

alert("Primero genera un QR");

}

}

</script>

</body>
</html>
