<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#f4f6f8,#e9eef5);
margin:0;
transition:0.4s;
}

/* MODO OSCURO */

.dark-mode{
background:#111;
color:white;
}

.dark-mode .card{
background:#1e1e1e;
color:white;
}

.dark-mode input{
background:#333;
color:white;
border:1px solid #555;
}

/* LOGO */

.logo{
position:absolute;
top:15px;
left:20px;
width:140px;
}

/* BOTON MODO OSCURO */

.darkbtn{
position:absolute;
top:20px;
right:20px;
padding:10px 15px;
}

/* CONTENEDOR */

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* TARJETA */

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:90%;
max-width:450px;
animation:fadeIn 1s ease;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

/* COLOR */

.colorpick{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin:10px 0;
}

/* BOTONES */

button{
padding:12px;
margin:5px 0;
border:none;
border-radius:6px;
background:#2b7cff;
color:white;
cursor:pointer;
font-size:15px;
width:100%;
transition:0.25s;
}

button:hover{
background:#1a5edb;
transform:scale(1.05);
}

/* QR */

#qrcode{
margin-top:20px;
padding:15px;
background:white;
border-radius:10px;
animation:fadeQR 0.6s ease;
}

/* QR ESTILO PRO */

#qrcode canvas{
border-radius:8px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

/* TIPOS QR */

.tiposQR{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
margin-top:10px;
}

/* FOOTER */

footer{
margin-top:25px;
font-size:13px;
color:#777;
}

/* ANIMACIONES */

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeQR{
from{opacity:0;transform:scale(0.7);}
to{opacity:1;transform:scale(1);}
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<button class="darkbtn" onclick="modoOscuro()">🌙 Modo oscuro</button>

<div class="container">

<div class="card">

<h1>Free QR Generator</h1>

<input id="texto" placeholder="Pon un link o texto">

<div class="colorpick">

<label>Color QR</label>
<input type="color" id="colorQR" value="#000000">

<label>Fondo</label>
<input type="color" id="colorBG" value="#ffffff">

</div>

<button onclick="generarQR()">Generar QR</button>

<div id="qrcode"></div>

<button onclick="descargarQR('png')">⬇️ Descargar PNG</button>
<button onclick="descargarQR('jpg')">⬇️ Descargar JPG</button>

<button onclick="compartirQR()">📤 Compartir QR</button>

<h3>Tipos de QR</h3>

<div class="tiposQR">

<button onclick="tipoQR('wifi')">📶 WiFi</button>
<button onclick="tipoQR('whatsapp')">💬 WhatsApp</button>
<button onclick="tipoQR('email')">📧 Email</button>
<button onclick="tipoQR('tel')">📞 Teléfono</button>

</div>

<div id="camposQR"></div>

<footer>
Free QR Generator • Gratis y rápido
</footer>

</div>

</div>

<script>

let qr;

/* GENERAR QR NORMAL */

function generarQR(){

let texto=document.getElementById("texto").value;

if(texto===""){
alert("Escribe algo primero");
return;
}

crearQR(texto);

}

/* CREAR QR */

function crearQR(texto){

document.getElementById("qrcode").innerHTML="";

let color=document.getElementById("colorQR").value;
let bg=document.getElementById("colorBG").value;

qr=new QRCode(document.getElementById("qrcode"),{
text:texto,
width:220,
height:220,
colorDark:color,
colorLight:bg,
correctLevel:QRCode.CorrectLevel.H
});

}

/* DESCARGAR */

function descargarQR(formato){

let canvas=document.querySelector("#qrcode canvas");

if(canvas){

let link=document.createElement("a");
link.download="qr."+formato;
link.href=canvas.toDataURL("image/"+formato);
link.click();

}else{

alert("Primero genera un QR");

}

}

/* MODO OSCURO */

function modoOscuro(){
document.body.classList.toggle("dark-mode");
}

/* CAMBIAR TIPOS */

function tipoQR(tipo){

let campos=document.getElementById("camposQR");

if(tipo==="wifi"){
campos.innerHTML=`
<input id="ssid" placeholder="Nombre del WiFi">
<input id="pass" placeholder="Contraseña">
<select id="seguridad">
<option value="WPA">WPA/WPA2</option>
<option value="WEP">WEP</option>
<option value="nopass">Sin contraseña</option>
</select>
<button onclick="generarQRwifi()">Generar QR</button>
`;
}

if(tipo==="whatsapp"){
campos.innerHTML=`
<input id="numero" placeholder="Número con código país">
<input id="mensaje" placeholder="Mensaje (opcional)">
<button onclick="generarQRwhatsapp()">Generar QR</button>
`;
}

if(tipo==="email"){
campos.innerHTML=`
<input id="correo" placeholder="Correo electrónico">
<button onclick="generarQRemail()">Generar QR</button>
`;
}

if(tipo==="tel"){
campos.innerHTML=`
<input id="telefono" placeholder="Número de teléfono">
<button onclick="generarQRtel()">Generar QR</button>
`;
}

}

/* WIFI */

function generarQRwifi(){

let ssid=document.getElementById("ssid").value;
let pass=document.getElementById("pass").value;
let seg=document.getElementById("seguridad").value;

crearQR(`WIFI:T:${seg};S:${ssid};P:${pass};;`);

}

/* WHATSAPP */

function generarQRwhatsapp(){

let num=document.getElementById("numero").value;
let msg=document.getElementById("mensaje").value;

crearQR(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);

}

/* EMAIL */

function generarQRemail(){

let correo=document.getElementById("correo").value;

crearQR(`mailto:${correo}`);

}

/* TELEFONO */

function generarQRtel(){

let tel=document.getElementById("telefono").value;

crearQR(`tel:${tel}`);

}

/* COMPARTIR */

function compartirQR(){

let canvas=document.querySelector("#qrcode canvas");

if(canvas){

canvas.toBlob(function(blob){

let file=new File([blob],"qr.png",{type:"image/png"});

if(navigator.share){

navigator.share({
title:"QR generado",
text:"Mira este QR que generé",
files:[file]
});

}else{

alert("Tu navegador no soporta compartir directo");

}

});

}else{

alert("Primero genera un QR");

}

}

</script>

</body>
</html>
